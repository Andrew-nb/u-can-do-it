<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="自律">
    <meta name="theme-color" content="#4f46e5">
<link rel="apple-touch-icon" href="icon-v2.png">
<link rel="icon" type="image/png" href="icon-v2.png">
    <link rel="manifest" href="manifest.json">
<title>自律</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen pb-24">
    <!-- Sleep Check-in Page -->
    <div id="sleepPage" class="page-content active">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800" id="sleepGreeting"></h2>
            </div>

            <div class="flex justify-center items-center mb-8">
                <button id="sleepCheckInBtn" class="sleep-circle-btn">
                    <div id="sleepTimeDisplay" class="text-4xl font-bold">
                        --:--:--
                    </div>
                </button>
            </div>

            <div class="bg-white rounded-2xl shadow-xl p-6">
                <div class="chart-header">
                    <h3 class="chart-title"><span>入睡时间</span><span>趋势曲线</span></h3>
                    <div class="time-range-group">
                        <button class="time-range-btn active" data-range="week">本周</button>
                        <button class="time-range-btn" data-range="month">本月</button>
                        <button class="time-range-btn" data-range="halfYear">半年</button>
                        <button class="time-range-btn" data-range="year">一年</button>
                    </div>
                </div>
                <div id="sleepChart" style="width: 100%; height: 400px;"></div>
            </div>
        </div>
    </div>

    <!-- Habit Check-in Page -->
    <div id="habitPage" class="page-content">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800" id="habitDate"></h2>
                <p class="text-gray-600 mt-2" id="habitWeekInfo"></p>
            </div>

            <div class="text-center mb-8">
                <button id="addHabitBtn" class="bg-gradient-to-r from-green-500 to-teal-600 hover:from-green-600 hover:to-teal-700 text-white font-bold py-3 px-8 rounded-xl transition-all transform hover:scale-105 shadow-lg">
                    ➕ 添加新习惯
                </button>
            </div>

            <div id="habitList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

            <div id="emptyHabitState" class="text-center py-16 hidden">
                <div class="text-6xl mb-4">📝</div>
                <p class="text-gray-500 text-lg">还没有添加任何习惯</p>
                <p class="text-gray-400 mt-2">点击上方按钮添加你的第一个习惯吧！</p>
            </div>
        </div>
    </div>

    <!-- Check-in Records Page -->
    <div id="recordPage" class="page-content">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800">缺卡记录</h2>
                <p class="text-gray-600 mt-2">查看你的历史记录</p>
            </div>

            <div class="bg-white rounded-2xl shadow-xl p-6">
                <div class="flex justify-between items-center mb-6">
                    <button id="prevMonth" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition-all">
                        ← 上月
                    </button>
                    <h3 id="currentMonth" class="text-xl font-bold text-gray-800"></h3>
                    <button id="nextMonth" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition-all">
                        下月 →
                    </button>
                </div>

                <div id="calendarGrid" class="grid grid-cols-7 gap-1 mb-6">
                    <div class="text-center font-bold text-gray-600 py-2">一</div>
                    <div class="text-center font-bold text-gray-600 py-2">二</div>
                    <div class="text-center font-bold text-gray-600 py-2">三</div>
                    <div class="text-center font-bold text-gray-600 py-2">四</div>
                    <div class="text-center font-bold text-gray-600 py-2">五</div>
                    <div class="text-center font-bold text-gray-600 py-2">六</div>
                    <div class="text-center font-bold text-gray-600 py-2">日</div>
                </div>

                <div class="border-t pt-6">
                    <h4 class="text-lg font-bold text-gray-800 mb-4">颜色说明</h4>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="flex items-center space-x-2">
                            <div class="w-8 h-8 rounded-lg" style="background-color:#10b981"></div>
                            <span class="text-sm text-gray-700">完美（0次）</span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <div class="w-8 h-8 rounded-lg" style="background-color:#fbbf24"></div>
                            <span class="text-sm text-gray-700">良好（&lt;2次）</span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <div class="w-8 h-8 rounded-lg" style="background-color:#fb923c"></div>
                            <span class="text-sm text-gray-700">一般（2-3次）</span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <div class="w-8 h-8 rounded-lg" style="background-color:#ef4444"></div>
                            <span class="text-sm text-gray-700">严重（&gt;3次）</span>
                        </div>
                    </div>
                </div>
            </div>

            <p class="text-center text-gray-400 text-sm mt-4 mb-2">由 <span style="color: #8A2BE2; font-weight: bold;">pyttt</span> vibe coding 生成</p>
        </div>
    </div>

    <!-- Add Habit Modal -->
    <div id="addHabitModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-gray-800">添加新习惯</h3>
                <button id="closeModalBtn" class="text-gray-500 hover:text-gray-700 text-3xl leading-none">&times;</button>
            </div>
            <form id="addHabitForm">
                <div class="mb-6">
                    <label class="block text-gray-700 font-medium mb-2">习惯名称</label>
                    <input type="text" id="habitName" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="例如：喝水、运动" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 font-medium mb-2">打卡类型</label>
                    <select id="habitType" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                        <option value="daily">每天打卡</option>
                        <option value="weekly" selected>每周打卡指定次数</option>
                    </select>
                </div>
                <div class="mb-6" id="frequencyGroup">
                    <label class="block text-gray-700 font-medium mb-2">每周打卡次数</label>
                    <input type="number" id="habitFrequency" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" min="1" max="7" value="3" required>
                    <p class="text-sm text-gray-500 mt-2">设置每周需要完成的次数（1-7次）</p>
                </div>
                <div class="flex space-x-4">
                    <button type="submit" class="flex-1 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold py-3 px-6 rounded-lg transition-all">
                        确认添加
                    </button>
                    <button type="button" id="cancelModalBtn" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-6 rounded-lg transition-all">
                        取消
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Floating Bottom Navigation -->
    <nav class="floating-nav" id="floatingNav">
        <button id="navSleep" class="nav-btn active" title="睡眠">
            😴
        </button>
        <button id="navHabit" class="nav-btn" title="习惯">
            ✅
        </button>
        <button id="navRecord" class="nav-btn" title="记录">
            📅
        </button>
        <span class="nav-divider"></span>
        <button id="syncIndicator" class="nav-btn sync-btn" title="云同步">
            📴
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
